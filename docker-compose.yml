services:
  expense-tracker-app:
    # Build configuration for the application
    build:
      context: . # Path to the Dockerfile context
      args:
        # Pass build-time environment variables (Required for NEXT_PUBLIC_ vars)
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL}

    # Custom name for the running container
    container_name: expense-tracker-app

    # Restart policy: starts unless manually stopped
    restart: unless-stopped

    # Port mapping: [Host Port] : [Container Port]
    ports:
      - "3068:3000"

    # Load all environment variables from a .env file
    env_file:
      - .env
  
    # Runtime-only environment variables
    environment:
      - NODE_ENV=production
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_DATABASE_URL=${NEXT_PUBLIC_DATABASE_URL}