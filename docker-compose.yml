services:
  expense-tracker-app:
    build:
      context: .
      args:
        # ดึงค่าจาก .env ในเครื่องตอน build
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
    container_name: expense-tracker-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    # environment:  <-- ถ้ามี env_file แล้ว และชื่อตัวแปรตรงกัน ไม่ต้องใส่ซ้ำตรงนี้ก็ได้ครับ
    # แต่ถ้าจะใส่ เพื่อความปลอดภัยให้ใส่แค่ชื่อตัวแปรโดยไม่มีค่า (Value)
    environment:
      - NODE_ENV=production
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}